name: Release

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/release.yml'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update, for example v1.0.2'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: imagegen-ui
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: imagegen-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: npm run dist -- --publish never

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $version = node -p "require('./package.json').version"
              $tag = "v$version"
            }
          }
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $assets = Get-ChildItem -Path dist -File |
            Where-Object { $_.Name -match '\.(exe|yml|yaml|blockmap)$' }

          if (-not $assets) {
            throw "No release assets found in imagegen-ui/dist."
          }

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title $tag --notes "ImageGenStudio $tag"
          }

          foreach ($asset in $assets) {
            gh release upload $tag $asset.FullName --repo $repo --clobber
          }
