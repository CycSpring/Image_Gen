name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create or update, for example v1.0.4'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: imagegen-ui
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: imagegen-ui/package-lock.json

      - name: Setup host Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: npm ci

      - name: Prepare embedded Python
        shell: pwsh
        run: .\setup-embed-python.ps1

      - name: Verify embedded Python dependencies
        shell: pwsh
        run: .\python-embed\python.exe -c "import openai, PIL; print('embedded Python dependencies ok')"

      - name: Build installers
        run: npm run dist -- --publish never

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            if ("${{ github.ref_type }}" -eq "tag") {
              $tag = "${{ github.ref_name }}"
            } else {
              $version = node -p "require('./package.json').version"
              $tag = "v$version"
            }
          }
          if (-not $tag.StartsWith("v")) {
            $tag = "v$tag"
          }
          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Publish release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $repo = "${{ github.repository }}"
          $version = node -p "require('./package.json').version"
          $assetNames = @(
            "ImageGenStudio-$version.exe",
            "ImageGenStudio-Setup-$version.exe",
            "ImageGenStudio-Setup-$version.exe.blockmap",
            "latest.yml"
          )

          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $repo --title $tag --notes "ImageGenStudio $tag"
          }

          $existingAssets = gh release view $tag --repo $repo --json assets --jq '.assets[].name'
          foreach ($assetName in $existingAssets) {
            if ([string]::IsNullOrWhiteSpace($assetName)) {
              continue
            }
            gh release delete-asset $tag $assetName --repo $repo --yes
          }

          Move-Item -LiteralPath "dist/ImageGenStudio $version.exe" -Destination "dist/ImageGenStudio-$version.exe" -Force
          Move-Item -LiteralPath "dist/ImageGenStudio Setup $version.exe" -Destination "dist/ImageGenStudio-Setup-$version.exe" -Force
          Move-Item -LiteralPath "dist/ImageGenStudio Setup $version.exe.blockmap" -Destination "dist/ImageGenStudio-Setup-$version.exe.blockmap" -Force

          foreach ($assetName in $assetNames) {
            $assetPath = Join-Path "dist" $assetName
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
              throw "Missing release asset: $assetName"
            }
            gh release upload $tag $assetPath --repo $repo --clobber
          }

          gh release edit $tag --repo $repo --draft=false --latest
